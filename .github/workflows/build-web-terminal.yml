# ABOUTME: Build and push the attendee web-terminal image (ttyd + kubectl) to GHCR on GitHub's runners.
# ABOUTME: Triggered on changes to images/web-terminal/** or manually via workflow_dispatch.
name: build-web-terminal

on:
  workflow_dispatch: {}
  push:
    branches: [staging, main]
    paths:
      - 'images/web-terminal/**'
      - '.github/workflows/build-web-terminal.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/web-terminal
          push: true
          tags: ghcr.io/peopleforrester/watch-it-burn:web-terminal
