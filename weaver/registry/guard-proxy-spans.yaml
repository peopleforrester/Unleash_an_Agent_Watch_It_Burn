# ABOUTME: Weaver span-group contract for the guard-proxy spans (PRD #20 M6 / #22 M1, M3).
# ABOUTME: The HTTP SERVER hop and the gen_ai "sanitize" INTERNAL span, ref'd to OTel semconv v1.37.0.
#
# This is the source of truth for what guard-proxy/proxy.py emits. `weaver registry check` resolves every
# ref against the pinned upstream registry (manifest.yaml -> otel v1.37.0); a typo or a renamed upstream
# attribute fails the check in CI. `weaver live-check` (docs/weaver-live-check.md) then compares real
# telemetry from the running proxy against this same contract. Keep these groups in lockstep with the
# set_attribute(...) calls in proxy.py.
groups:
  # --- The inbound HTTP hop. agentgateway -> guard-proxy, joined to the upstream trace via W3C context. ---
  - id: span.witb.guard_proxy.http
    type: span
    span_kind: server
    stability: development
    brief: >-
      The guard-proxy HTTP SERVER span (`POST <path>`). Emitted by proxy.py do_POST after extracting the
      upstream W3C context, so the guard hop appears in the agentgateway -> agent waterfall.
    attributes:
      - ref: http.request.method
        requirement_level: required
        note: Always "POST" for the A2A JSON-RPC path the proxy guards.
      - ref: url.path
        requirement_level: recommended
        note: The request path (e.g. the A2A endpoint or "/toggle"); set from self.path.
      - ref: url.scheme
        requirement_level: recommended
        note: >-
          Part of the HTTP SERVER contract (PRD #22 M3). proxy.py does not currently set it (the scheme is
          implied http for the in-cluster A2A hop); declared Recommended so the contract stays complete and
          a future emit conforms. Recommended-and-absent is not a live-check violation.
      - ref: http.response.status_code
        requirement_level: required
        note: Set by _send at every exit (200 pass, 403 block, 502 upstream failure).

  # --- The guard decision + forward, modelled as a gen_ai "chat" span so Datadog renders the LLM panel. ---
  #
  # LIVE-CHECK ACCEPTANCE (PRD #22 M3, manual step, NOT a CI gate): to validate that the opt-in
  # gen_ai.input/output.messages are actually present and conform to schema on a running proxy, run a beat
  # against a cluster with guard-proxy armed for content capture
  # (OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT=SPAN_ONLY), capture the sanitize span, and run
  # `weaver registry live-check --registry weaver/registry/ --input-source <spans.json> --input-format json`.
  # See docs/weaver-live-check.md for the exact sample-telemetry format and the pass/fail semantics.
  - id: span.witb.guard_proxy.sanitize
    type: span
    span_kind: internal
    stability: development
    brief: >-
      The guard-proxy `sanitize` INTERNAL span. Wraps the block-or-pass decision and the forward.
      gen_ai.operation.name is fixed to "chat" so Datadog LLM Observability classifies it as an llm-kind
      span and renders the before/after message panel. The proxy forwards the prompt UNCHANGED, so the
      input (original) and output (forwarded) messages are equal here; the re-leak redaction is the
      Collector OTTL Act-2 step (PRD #22 M2), not in-proxy.
    attributes:
      - ref: gen_ai.operation.name
        requirement_level: required
        note: >-
          Fixed to the "chat" enum member. This is the classification signal Datadog uses to treat the
          span as an LLM operation; it is NOT "sanitize" (that is the span NAME, not the operation).
      - ref: gen_ai.input.messages
        requirement_level: opt_in
        note: >-
          The original inbound prompt as a single OTel GenAI message envelope, emitted as a JSON string
          ([{role:user, parts:[{type:text, content:...}]}]). OPT-IN: only present when content capture is
          armed (OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT in SPAN_ONLY/EVENT_ONLY/SPAN_AND_EVENT).
          This is the attribute the Act-2 OTTL processor (PRD #22 M2) replaces with [DEMO-REDACTED].
      - ref: gen_ai.output.messages
        requirement_level: opt_in
        note: >-
          The forwarded prompt, emitted as a JSON string. Equal to gen_ai.input.messages because the proxy
          forwards unchanged. Same opt-in content-capture gating as the input messages.

  # --- The outbound CLIENT hop. guard-proxy -> agentgateway (the next hop fronting the kagent agent). ---
  #
  # Emitted by proxy.py inside the forward call (PRD #27 M2). peer.service names the downstream node so the
  # Datadog Service Map draws the guard-proxy -> agentgateway edge. peer.service is derived from AGENT_URL's
  # host in code, so it reduces to "agentgateway" exactly when AGENT_URL fronts agentgateway (the target
  # topology); until agentgateway is deployed it names the real next hop (the kagent agent) instead.
  - id: span.witb.guard_proxy.egress
    type: span
    span_kind: client
    stability: development
    brief: >-
      The guard-proxy outbound CLIENT span (`agent.forward`). Wraps the HTTP POST that forwards the guarded
      A2A request to the next hop (agentgateway in the target topology). Creates the guard-proxy -> next-hop
      edge in the Datadog Service Map via peer.service.
    attributes:
      - ref: http.request.method
        requirement_level: required
        note: Always "POST" for the A2A JSON-RPC forward.
      - ref: url.full
        requirement_level: required
        note: The full forward URL (AGENT_URL + request path); set from the proxy's outbound request.
      - ref: http.response.status_code
        requirement_level: required
        note: >-
          The downstream response status on success; on a connection-level forward failure it is absent
          (the span instead carries error.type and an ERROR status), so this is required-on-success.
      - ref: peer.service
        requirement_level: required
        note: >-
          The logical name of the downstream service ("agentgateway" in the target topology). This is the
          Service Map edge signal; defined in the upstream OTel semconv registry (resolved via the
          manifest.yaml dependency), no local definition needed.
