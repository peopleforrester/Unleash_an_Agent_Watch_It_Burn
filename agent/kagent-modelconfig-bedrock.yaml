# ABOUTME: kagent ModelConfig wiring the workshop agent to AWS Bedrock.
# ABOUTME: Native Bedrock provider (NOT the OpenAI-baseURL shim tutorials show).
#
# verify-at-build: confirmed against kagent chart 0.9.7, CRD group kagent.dev/v1alpha2
# (research/01-kagent.md). Bedrock exists ONLY in v1alpha2. `spec.bedrock.region` is the
# only required Bedrock sub-field; credentials resolve via the AWS credential chain when
# `apiKeySecret` is omitted (preferred on EKS via IRSA / pod identity).
# verify-at-build: confirm a Bedrock model id enabled in the account/region before pinning.
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: bedrock-claude
  namespace: ATTENDEE_NAMESPACE # attendee agent namespace (independent per-attendee cluster)
spec:
  provider: Bedrock
  # NON-CANONICAL copy. The source of truth is gitops/ai-layer/resources.yaml (GitOps canonical).
  # Aligned to Haiku 4.5 to match canonical; tier swaps + the comparison live in the canonical file.
  model: us.anthropic.claude-haiku-4-5-20251001-v1:0 # Haiku 4.5 inference profile (verified)
  bedrock:
    region: us-west-2
