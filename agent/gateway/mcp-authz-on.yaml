# ABOUTME: Toggle state — MCP authorization ON (beat-3 "after"): CEL Deny on the rogue tool.
# ABOUTME: Denies read_internal_config + sets a targets allowlist; the rogue call is blocked/filtered.
#
# This overlays agentgateway.yaml's policies.mcpAuthorization to enforce the beat-3 "after":
#   - the rogue tool read_internal_config (the one beat 3's poisoned MCP description induces, which
#     leaks FAKE-MCP-EXFIL-sentinel-4c1d) is DENIED;
#   - the legitimate tools the good agent needs are explicitly Allowed;
#   - the targets allowlist confines authz to the one known MCP server.
# Because agentgateway auto-filters disallowed tools from list_tools, the agent should no longer
# even SEE read_internal_config; an explicit call to it is rejected.
#
# CONFIRMED mechanism (research/02-agentgateway.md §4, research/14 §2b): the OSS standalone
# mcpAuthorization model is ALLOW-ONLY CEL with implicit deny. There is NO `action` field on rules.
# A request is allowed if any rule matches; anything not matched is denied and filtered out of
# list_tools. So the DENY is expressed as an allowlist naming ONLY the permitted tools —
# read_internal_config is not listed, so it is implicitly denied and the agent never sees it.
#
# verify-at-build: [SPIKE] (Phase 4b, gates beat-3 LIVE) — confirm mcpAuthorization allowlist
#   ENFORCES on Apache OSS v1.3.0 with kagent in front (docs/BUILD-SPEC.md §11.1). PASS -> beat 3
#   live; FAIL -> recorded segment + governance-map row. Record in beats/03-.../BUILD-SPIKE.md.
# verify-at-build: the doc schema nests mcpAuthorization under mcp.policies.mcpAuthorization (and
#   targets under mcp.targets[]). Re-verify the exact mcp.{targets,policies} nesting against the
#   v1.3.0 standalone config schema at build (research/14 §2c).
#
# RECONCILIATION (agentgateway is now canonical in gitops/ai-layer/agentgateway.yaml):
#   - This overlay rewrites the WHOLE agentgateway-config config.yaml. The canonical deployed config
#     also carries a `tracing:` block (research/29) and a request promptGuard webhook (input guard).
#     COMPLETENESS TRAP: applying this toggle as-written drops both. Before beat-3 LIVE, reconcile the
#     config.yaml body here against gitops/ai-layer/agentgateway.yaml so the toggle carries the full
#     canonical config (tracing + promptGuard) and only flips the mcpAuthorization rules.
#   - Namespace: the gitops deploy model resolves to the fixed `agent` namespace (kustomization),
#     NOT the per-attendee ATTENDEE_NAMESPACE template below. The provisioner substitutes
#     ATTENDEE_NAMESPACE -> the live namespace (`agent` for the gitops model) before apply.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-config
  namespace: ATTENDEE_NAMESPACE
  labels:
    app.kubernetes.io/name: agentgateway
    workshop.toggle/mcp-authz: "on"
data:
  config.yaml: |
    listeners:
      - name: agent-a2a
        protocol: HTTP
        port: 3000
        routes:
          - name: to-agent
            backends:
              - host: workshop-agent.ATTENDEE_NAMESPACE.svc.cluster.local
                port: 8080
      - name: agent-mcp
        protocol: HTTP
        port: 3001
    # MCP config nests under `mcp.` (research/14 §2c): targets allowlist + mcpAuthorization policy.
    mcp:
      targets:
        # targets allowlist is structural: only this MCP server is reachable for tool calls.
        - name: workshop-mcp
          host: workshop-mcp.ATTENDEE_NAMESPACE.svc.cluster.local
          port: 8080
      policies:
        mcpAuthorization:
          # Allow-only, implicit-deny: only these tools are reachable. read_internal_config is not
          # listed, so it is denied and filtered out of list_tools (the beat-3 "after").
          rules:
            - 'mcp.tool.name == "list_pods"'
            - 'mcp.tool.name == "apply_manifest"'
            - 'mcp.tool.name == "get_secret"'
