# ABOUTME: Deploys the A2A guard proxy in front of the kagent agent Service (manual/spec deploy path).
# ABOUTME: Runs proxy.py (mounted via ConfigMap) on a stock python image; toggles via env.
# SOURCE OF TRUTH for proxy.py is gitops/ai-layer/proxy.py (the deployed app-of-apps copy). The copy
# here is kept byte-identical for this manual path and the PRD #7 / research references; if you change
# the guard proxy, edit gitops/ai-layer/proxy.py and re-sync this one (do not let them drift).
# The ConfigMap guard-proxy-src is created from proxy.py at deploy time:
#   kubectl create configmap guard-proxy-src --from-file=proxy.py=agent/gateway/guard-proxy/proxy.py
# Toggle the guards by patching INPUT_GUARD / OUTPUT_GUARD env to "on"/"off" (see beat-2 toggles).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guard-proxy
  namespace: ATTENDEE_NAMESPACE
  labels:
    app.kubernetes.io/name: guard-proxy
    app.kubernetes.io/component: output-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guard-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guard-proxy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: python:3.12-slim # verify-at-build: pin @sha256; for prod bake proxy.py into an image
          command: ["python", "/app/proxy.py"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AGENT_URL
              value: "http://workshop-agent.ATTENDEE_NAMESPACE.svc.cluster.local:8080"
            - name: LLM_GUARD_URL
              value: "http://llm-guard.ATTENDEE_NAMESPACE.svc.cluster.local:8000"
            - name: LLM_GUARD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-guard-auth
                  key: token
            - name: INPUT_GUARD
              value: "off" # default OFF at workshop start; beat-2 input toggle flips to "on"
            - name: OUTPUT_GUARD
              value: "off" # default OFF at workshop start; beat-2 output toggle flips to "on"
            - name: PROXY_FAIL_CLOSED
              value: "true"
            # Unified Service Tagging for Datadog correlation (service / version / env). The Datadog
            # exporter maps deployment.environment.name -> env (Exporter v0.110.0+) and service.version
            # -> version; service.version carries the cluster tier so the model-tier cost race is one
            # panel. The Datadog Agent also reads this env to tag this pod's container logs.
            # verify-at-build: substitute CLUSTER_TIER per cluster (cluster-1 / cluster-2 / cluster-3).
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=guard-proxy,service.version=CLUSTER_TIER,deployment.environment.name=watch-it-burn"
            # Where OTLP telemetry goes once proxy.py is instrumented (OTel SDK is a separate task).
            # verify-at-build: confirm the collector Service name for the pinned chart release.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          volumeMounts:
            - name: src
              mountPath: /app
              readOnly: true
      volumes:
        - name: src
          configMap:
            name: guard-proxy-src
---
apiVersion: v1
kind: Service
metadata:
  name: guard-proxy
  namespace: ATTENDEE_NAMESPACE
  labels:
    app.kubernetes.io/name: guard-proxy
spec:
  selector:
    app.kubernetes.io/name: guard-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
