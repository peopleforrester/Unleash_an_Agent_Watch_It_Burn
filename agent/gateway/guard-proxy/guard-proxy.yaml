# ABOUTME: Deploys the A2A guard proxy in front of the kagent agent Service.
# ABOUTME: Runs proxy.py (mounted via ConfigMap) on a stock python image; toggles via env.
# The ConfigMap guard-proxy-src is created from proxy.py at deploy time:
#   kubectl create configmap guard-proxy-src --from-file=proxy.py=agent/gateway/guard-proxy/proxy.py
# Toggle the guards by patching INPUT_GUARD / OUTPUT_GUARD env to "on"/"off" (see beat-2 toggles).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guard-proxy
  namespace: ATTENDEE_NAMESPACE
  labels:
    app.kubernetes.io/name: guard-proxy
    app.kubernetes.io/component: output-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guard-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guard-proxy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: python:3.12-slim # verify-at-build: pin @sha256; for prod bake proxy.py into an image
          command: ["python", "/app/proxy.py"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AGENT_URL
              value: "http://workshop-agent.ATTENDEE_NAMESPACE.svc.cluster.local:8080"
            - name: LLM_GUARD_URL
              value: "http://llm-guard.ATTENDEE_NAMESPACE.svc.cluster.local:8000"
            - name: LLM_GUARD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-guard-auth
                  key: token
            - name: INPUT_GUARD
              value: "off" # default OFF at workshop start; beat-2 input toggle flips to "on"
            - name: OUTPUT_GUARD
              value: "off" # default OFF at workshop start; beat-2 output toggle flips to "on"
            - name: PROXY_FAIL_CLOSED
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          volumeMounts:
            - name: src
              mountPath: /app
              readOnly: true
      volumes:
        - name: src
          configMap:
            name: guard-proxy-src
---
apiVersion: v1
kind: Service
metadata:
  name: guard-proxy
  namespace: ATTENDEE_NAMESPACE
  labels:
    app.kubernetes.io/name: guard-proxy
spec:
  selector:
    app.kubernetes.io/name: guard-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
