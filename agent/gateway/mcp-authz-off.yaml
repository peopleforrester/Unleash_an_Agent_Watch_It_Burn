# ABOUTME: Toggle state — MCP authorization OFF (beat-3 "before"; workshop default).
# ABOUTME: Default Allow, no deny — ALL of the MCP server's tools are reachable, incl. the rogue one.
#
# This overlays agentgateway.yaml's policies.mcpAuthorization with a single permissive rule so
# every tool on workshop-mcp is callable — including read_internal_config, the rogue tool whose
# poisoned description induces the agent to leak FAKE-MCP-EXFIL-sentinel-4c1d (beat-3 "before").
#
# CONFIRMED mechanism (research/02-agentgateway.md §4): mcpAuthorization rules are CEL expressions
# over mcp.tool.name etc., evaluated per MCP method (list_tools, call_tool); rules OR together,
# any match grants access; disallowed tools are auto-filtered from list_tools.
#
# verify-at-build: [SPIKE] (Phase 4b, gates beat-3 LIVE) — whether the mcpAuthorization allowlist
#   actually ENFORCES on the Apache OSS v1.3.0 build with a kagent agent in front is the single
#   load-bearing unknown for beat 3. If the spike FAILS, beat 3 demotes to a recorded segment +
#   governance-map row; the recording is built regardless (docs/BUILD-SPEC.md §11.1).
# verify-at-build: confirm CEL rule syntax + the mcp.{targets,policies} nesting on OSS v1.3.0
#   standalone (research/14 §2c).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-config
  namespace: ATTENDEE_NAMESPACE
  labels:
    app.kubernetes.io/name: agentgateway
    workshop.toggle/mcp-authz: "off"
data:
  config.yaml: |
    listeners:
      - name: agent-a2a
        protocol: HTTP
        port: 3000
        routes:
          - name: to-agent
            backends:
              - host: workshop-agent.ATTENDEE_NAMESPACE.svc.cluster.local
                port: 8080
            # input guard governed by its own toggle files.
      - name: agent-mcp
        protocol: HTTP
        port: 3001
    # MCP config nests under `mcp.` (research/14 §2c): targets allowlist + mcpAuthorization policy.
    mcp:
      targets:
        - name: workshop-mcp
          host: workshop-mcp.ATTENDEE_NAMESPACE.svc.cluster.local
          port: 8080
      policies:
        mcpAuthorization:
          rules:
            # OFF: default Allow — no deny anywhere. read_internal_config is reachable.
            - 'true'
