# ABOUTME: Attack-1 (exfil) control for the AGENT layer. Egress allowlist for the agent namespace:
# ABOUTME: in-VPC only (Bedrock via its PrivateLink endpoint + the kube-apiserver ENI). S3 PutObject
# ABOUTME: goes to the public internet, which has no allow here, so the agent's exfil is denied.
#
# This is the agent-namespace twin of apps-egress-allowlist.yaml. The AI layer (guard-proxy,
# agentgateway, kagent/workshop-agent, workshop-mcp) runs in `agent`, NOT `apps`, so the apps-only
# policies left agent egress wide open even under Round 2 — that was the C1 gap. Selecting agent pods
# with an Egress policy makes them default-deny-egress; the rules below are the only permitted egress.
#
# Bedrock reachability depends on the interface endpoint in infra/terraform/aws/network/main.tf
# (aws_vpc_endpoint.bedrock_runtime, private DNS on): the agent resolves
# bedrock-runtime.<region>.amazonaws.com to an in-VPC ENI (10.0.0.0/16), matched below on 443.
# CAVEAT: this control holds only while there is NO S3 gateway/interface endpoint in this VPC
# (see the terraform comment); an S3 endpoint would make S3 look in-VPC and defeat the CIDR allow.
#
# Companion egress allows (DNS, OTLP, intra-namespace) live in the sibling agent-*.yaml files; this
# file is egress-only and deliberately does not touch ingress to the agent layer.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-egress-allowlist
  namespace: agent
spec:
  # SCOPED to the kagent agent pod (the C1 attacker that would PutObject to S3), NOT the whole namespace.
  # The MCP-server pods (workshop-mcp, evil-mcp-shim) pip-install `mcp` from PyPI at startup; a namespace-
  # wide egress deny blocks that and they never bind 8000 (found live 2026-06-26: agentgateway -> workshop-mcp
  # was "connection refused" because the server never started). The agent runs a prebuilt kagent image (no
  # runtime pip), so locking only it preserves C1 while leaving the MCP servers able to start.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workshop-agent
  policyTypes:
    - Egress
  egress:
    # In-VPC only: AWS VPC endpoints (Bedrock via PrivateLink) + the kube-apiserver ENI. NOT the
    # internet. cidr is the lab VPC CIDR (NOT 0.0.0.0/0). S3 has no endpoint, so it is not in here.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - { protocol: TCP, port: 443 }
    # EKS Pod Identity credentials endpoint (link-local, AWS_CONTAINER_CREDENTIALS_FULL_URI =
    # http://169.254.170.23/v1/credentials). The agent fetches its AWS creds here to call Bedrock; without
    # this allow the Bedrock call fails "Error retrieving credentials from container-role" (found live
    # 2026-06-26). Link-local node-local endpoint, not an internet path, so C1 still holds.
    - to:
        - ipBlock:
            cidr: 169.254.170.23/32
      ports:
        - { protocol: TCP, port: 80 }
