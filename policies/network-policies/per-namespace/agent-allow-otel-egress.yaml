# ABOUTME: NetworkPolicy allowing the agent layer to send telemetry to the OTel Collector.
# ABOUTME: Egress on OTLP ports 4317/4318 to the monitoring namespace (matched on the collector pod).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-allow-otel-egress
  namespace: agent
spec:
  # Scoped to the kagent agent pod (see agent-egress-allowlist.yaml); the MCP servers are not locked down.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workshop-agent
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
