# ABOUTME: Beat-1 control. Blocks out-of-band mutation of ArgoCD-managed resources.
# ABOUTME: Enforce from the start (no toggle); ArgoCD self-heal is defense in depth.
# verify-at-build: confirmed approach against Kyverno v1.18.1 + Argo CD v3.4.3
# (research/06-cncf-stack.md). background MUST be false for userInfo-based excludes.
#
# The exclude block is load-bearing: denying every non-ArgoCD principal on UPDATE/DELETE
# would also block the built-in controllers (deployment/replicaset/garbage-collector) and
# kubelet from maintaining the managed object, breaking it. So system service accounts,
# nodes, and cluster admins are excluded; everything else (the agent, ad-hoc kubectl) is
# denied. This was corrected during live build on the test cluster (2026-06-17).
#
# [SPIKE] The excluded ArgoCD principal is the identity the controller acts as when it
# reconciles the managed resource. Each cluster runs its own in-cluster ArgoCD, so this is the
# local argocd-application-controller SA (confirmed on the test cluster); confirm per cluster in
# Phase 4b.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-argocd-drift
  annotations:
    policies.kyverno.io/title: Block ArgoCD Drift
    policies.kyverno.io/category: Workshop / Beat 1
spec:
  background: false
  rules:
    - name: deny-drift-on-argocd-managed
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - ConfigMap
                - Service
              operations:
                - UPDATE
                - DELETE
              # NO label selector here. An earlier `app.kubernetes.io/instance Exists` selector made this
              # policy INERT on these clusters: ArgoCD here uses ANNOTATION tracking
              # (argocd.argoproj.io/tracking-id), not label tracking, so managed resources never carry
              # that label and the match never fired -- the agent could freely drift guard-proxy etc.
              # (caught live 2026-06-27 via a server dry-run patch as agent-sa, which was ADMITTED). The
              # PRECONDITION below is the correct, author-intended scoping: it gates on the tracking-id
              # annotation ArgoCD actually writes on every synced object.
      preconditions:
        # Scope the block to resources ArgoCD ACTUALLY manages: those carry the
        # `argocd.argoproj.io/tracking-id` annotation (ArgoCD writes it on every synced object).
        # ArgoCD's OWN install components (argocd-server, repo-server, etc.) do NOT carry it -- they
        # are Helm-installed by the bootstrap, not synced by an Application, so they are not "drift"
        # and must remain configurable (e.g. the Datadog Autodiscovery annotation). Without this the
        # broad app.kubernetes.io/instance selector wrongly treated ArgoCD's own pods as managed.
        # Verified live 2026-06-25: managed resources carry the annotation, argocd-server does not.
        all:
          - key: '{{ request.object.metadata.annotations."argocd.argoproj.io/tracking-id" || request.oldObject.metadata.annotations."argocd.argoproj.io/tracking-id" || ''NOT_MANAGED'' }}'
            operator: NotEquals
            value: NOT_MANAGED
      exclude:
        any:
          - subjects:
              # The ArgoCD controller owns these resources - it must be able to reconcile.
              - kind: ServiceAccount
                namespace: argocd
                name: argocd-application-controller
              # Built-in controllers and kubelet must keep the managed object healthy.
              - kind: Group
                name: system:serviceaccounts:kube-system
              - kind: Group
                name: system:nodes
              # Cluster admins can always intervene to fix things.
              - kind: Group
                name: system:masters
      validate:
        failureAction: Enforce
        message: >-
          This resource is managed by ArgoCD. Change it in Git, not in the cluster.
          Direct mutation by a non-ArgoCD principal is rejected.
        deny:
          conditions:
            any:
              - key: "true"
                operator: Equals
                value: "true"
