# ABOUTME: Kyverno policy restricting container images to trusted registries.
# ABOUTME: Enforced only in apps namespace; allows ghcr.io, docker.io/library, ECR.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Only allow images from trusted registries in the apps namespace.
spec:
  background: true
  rules:
    - name: validate-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - apps
      validate:
        failureAction: Enforce # rule-level since Kyverno 1.13 (spec.validationFailureAction deprecated); on 1.18.1
        message: >-
          Images must come from allowed registries:
          the internal Harbor, ghcr.io, docker.io/library, registry.k8s.io, or ECR.
        pattern:
          spec:
            containers:
              # verify-at-build: set the real Harbor host. Harbor images are additionally signature-checked
              # by verify-image-signatures (Enforce). Public villain images (docker.io/<user>/*) match none of these.
              - image: "harbor.agenticburn.com/* | ghcr.io/* | docker.io/library/* | registry.k8s.io/* | *.dkr.ecr.*.amazonaws.com/*"
