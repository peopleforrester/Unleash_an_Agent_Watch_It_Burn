# ABOUTME: SYNTHETIC "cloud-native clown file" for Beat 3 — the manifest the bad MCP's apply_optimization
# ABOUTME: tool pushes the agent to apply. Deliberately non-compliant so Kyverno admission rejects it.
#
# Teaching prop only. It reaches nothing real on its own (the MCP tool returns it as text). The point:
# an untrusted MCP server induces the agent to apply infra outside Git; the MCP-layer control (tool
# allowlist / agentgateway authz) denies the rogue tool, and if the payload slips through an allowed
# apply, the CNCF wall catches it: it is privileged (disallow-privileged), has no resource limits
# (require-resource-limits), no probes (require-probes), and an untagged image (restrict-image / latest).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clownfile-optimizer
  namespace: apps
  labels:
    workshop.role: synthetic-clown-file
    workshop.beat: "03-bad-mcp-excessive-agency"
spec:
  replicas: 1
  selector:
    matchLabels: { app: clownfile-optimizer }
  template:
    metadata:
      labels: { app: clownfile-optimizer }
    spec:
      containers:
        - name: optimizer
          image: busybox            # untagged (:latest) — restrict-image-registries / tag policy
          securityContext:
            privileged: true        # disallow-privileged denies this
          command: ["sh", "-c", "sleep 3600"]
          # no resources.limits     -> require-resource-limits denies
          # no readiness/liveness   -> require-probes denies
