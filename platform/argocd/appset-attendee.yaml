# ABOUTME: ApplicationSet (cluster generator) on the HUB ArgoCD — one Application per registered SPOKE cluster.
# ABOUTME: Delivers the full per-attendee IDP+agent+beats stack into every spoke labeled workshop-spoke=true.
#
# verify-at-build: confirmed against Argo CD v3.4.3 (research/06-cncf-stack.md, §5/§6).
#  - rev3 architecture: hub-and-spoke. This runs on the HUB cluster. Each attendee SPOKE EKS
#    cluster is registered to the hub with `argocd cluster add` (see infra/spoke-cluster/README.md),
#    which writes a cluster Secret labelled `workshop-spoke=true`. The clusters generator below
#    selects exactly those secrets, so N is whatever is registered — nothing here is hardcoded.
#  - selfHeal: true is intentional, defense-in-depth for beat 1 step 3 (ArgoCD reverts out-of-band
#    drift of the managed sample app even though the Kyverno drift policy blocks it at admission).
#  - The clusters generator exposes {{name}} / {{server}} / {{metadata.labels.*}} per matched cluster.
#    Argo CD v3.x uses Go-template-style {{...}} when goTemplate: true is set (preferred on 3.x).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: attendee-spokes
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # Cluster generator: one element per registered spoke cluster Secret carrying the label.
    - clusters:
        selector:
          matchLabels:
            workshop-spoke: "true"
  template:
    metadata:
      # One Application per spoke, e.g. "attendee-spoke-07".
      name: "attendee-{{.name}}"
      labels:
        workshop.role: spoke-content
    spec:
      project: workshop
      source:
        repoURL: https://github.com/peopleforrester/Unleash_an_Agent_Watch_It_Burn.git
        targetRevision: main
        # App-of-apps root for one spoke's content (Kyverno, Falco, OTel, agent, gateway, beats).
        path: platform/argocd/apps
      destination:
        # Deliver into the SPOKE cluster this generator element represents.
        server: "{{.server}}"
        namespace: workshop
      syncPolicy:
        automated:
          prune: true
          selfHeal: true # defense-in-depth for beat 1 — reverts drift of the managed sample app
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
