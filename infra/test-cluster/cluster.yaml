# ABOUTME: Small single-cluster EKS config for live validation of the workshop stack.
# ABOUTME: Not the final topology — used to verify the beats before scaling to hub+spokes.
# Node role carries bedrock:InvokeModel so kagent can reach Bedrock via the default cred chain.
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: watch-it-burn-test
  region: us-west-2
  version: "1.35" # EKS default / most-tested GA on standard support (1.36 exists but is newer/less proven)
  # Collision-avoidance tags: this AWS account is shared with a separate Packt project. Every resource
  # we create carries project=watch-it-burn so ours are unambiguous and never confused with theirs.
  # eksctl applies metadata.tags to the cluster and its shared CloudFormation resources.
  tags:
    project: watch-it-burn
    event: ai-engineer-worldsfair-2026
    role: test

iam:
  withOIDC: true # enables IRSA later (gateway/LLM Guard/Bedrock pod-scoped creds)

managedNodeGroups:
  - name: ng-default
    instanceType: t3.large
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 40
    labels:
      workshop-spoke: "true" # so the ArgoCD ApplicationSet cluster generator can target it later
    tags:
      project: watch-it-burn # propagate to the EC2/ASG so nodes are tagged ours too
      role: test
    iam:
      attachPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource: "*"

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver
    wellKnownPolicies:
      ebsCSIController: true # EKS has no CSI driver by default; PVCs (kagent Postgres, etc.) need it.
      # A default gp3 StorageClass is applied post-create (see the storage step in the build log).
