# ABOUTME: Helm values for the bootstrap ArgoCD install (deploy-full-idp.sh).
# ABOUTME: Folds the Datadog Agent Autodiscovery annotation onto argocd-server (PRD #26 M2).
#
# ArgoCD installs itself via Helm in the bootstrap (it is the GitOps engine; it is NOT managed by an
# ArgoCD Application, so its own config belongs here, not in a self-referential app). The block-argocd-drift
# kyverno policy is scoped to ArgoCD-MANAGED resources (those carry argocd.argoproj.io/tracking-id);
# argocd-server does not, so this annotation is permitted. Container metrics port is 8083. The `argocd`
# Datadog check is a multi-component check keyed by named endpoint (api_server_endpoint /
# app_controller_endpoint / repo_server_endpoint / ...), NOT a generic openmetrics_endpoint (verified
# live 2026-06-25). argocd-server is the API server, so api_server_endpoint.
dex:
  enabled: false
server:
  podAnnotations:
    # Datadog Unified Service Tagging (PRD #28): puts argocd-server on the service catalog / map as a
    # first-class platform component. env locked to production; version = deployed ArgoCD appVersion.
    tags.datadoghq.com/service: argocd
    tags.datadoghq.com/env: production
    tags.datadoghq.com/version: "v3.4.4"
    ad.datadoghq.com/server.checks: |
      {"argocd":{"instances":[{"api_server_endpoint":"http://%%host%%:8083/metrics"}]}}
