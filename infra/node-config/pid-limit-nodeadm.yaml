# ABOUTME: The REAL fork-bomb block: a per-pod PID cap via the kubelet. On AL2023 EKS nodes this is a
# ABOUTME: nodeadm KubeletConfiguration drop-in (podPidsLimit). The kernel refuses forks at the cgroup,
# ABOUTME: inline, before any detection or response, so the node survives. Falco/Talon are the RESPONSE
# ABOUTME: layer on top (reactive, has latency a bomb outruns), not what keeps the cluster alive.
#
# Delivery (verify-at-build, research/14 §1b): eksctl managed AL2023 nodegroups do not take
# kubeletExtraConfig, so this NodeConfig is delivered via eksctl
# `managedNodeGroups[].overrideBootstrapCommand` — eksctl PREPENDS the NodeConfig to the
# launch-template user-data and nodeadm MERGES it with the EKS-injected default NodeConfig (its
# multi-document merge does the combining; there is no manual /etc/eks/nodeadm.d/ file step). On AL2
# nodes the equivalent is the kubelet flag `--pod-max-pids=1024` via --kubelet-extra-args.
apiVersion: node.eks.aws/v1alpha1
kind: NodeConfig
spec:
  kubelet:
    config:
      podPidsLimit: 1024   # cap forks per pod; a fork bomb hits the wall here, the node stays up
