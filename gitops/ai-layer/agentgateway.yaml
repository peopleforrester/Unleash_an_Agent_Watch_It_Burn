# ABOUTME: agentgateway OSS v1.3.0 (GA 2026-06-18) — the DEPLOYED gateway fronting the kagent agent (A2A)
# ABOUTME: and the workshop MCP server. Namespace is set by the ai-layer kustomization (agent).
#
# Config schema verified live against agentgateway.dev/docs/standalone/latest on 2026-06-25:
#   - image registry is cr.agentgateway.dev (NOT ghcr.io).
#   - proxy config is binds[].port -> listeners[].routes[].backends[].host ("host:port" string, no separate
#     port field).
#   - OTLP tracing is the config-file key frontendPolicies.tracing.otlpEndpoint (gRPC :4317); the
#     OTEL_EXPORTER_OTLP_ENDPOINT env var is inert for trace export (resolves PRD #20 M4 / blocker #4).
#   - MCP front is the binds backend form backends[].mcp.targets[].mcp.host with route-level
#     policies.mcpAuthorization.rules (CEL, OR-combined; 'true' = default allow).
#
# GUARDING STAYS ON guard-proxy: agentgateway prompt-guards are documented ONLY for llm.models[] LLM-provider
# backends and are confirmed NOT to attach to a plain HTTP/A2A (JSON-RPC) backend (verified 2026-06-25). The
# workshop-agent is an A2A endpoint, so agentgateway fronts it as a plain L7 hop; the input/output guard
# decisions remain in guard-proxy (the LLM-Guard reverse proxy, research/02 recommended primary).
#
# verify-at-build (live cluster, does NOT block the A2A hop):
#   - MCP target path: workshop-mcp serves streamable-http at :8000/mcp (RemoteMCPServer url in resources.yaml).
#     Confirm agentgateway reaches it. The kagent RemoteMCPServer still points DIRECT at workshop-mcp; routing
#     the agent's MCP calls THROUGH agentgateway (so mcpAuthorization enforces for beat 3) is the remaining
#     reconciliation (the kagent toolNames allowlist in resources.yaml is the recorded fallback).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentgateway
  labels: { app.kubernetes.io/name: agentgateway, app.kubernetes.io/component: gateway }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  labels:
    app.kubernetes.io/name: agentgateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "1.3.0"
spec:
  replicas: 1
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app.kubernetes.io/name: agentgateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: agentgateway, app.kubernetes.io/component: gateway }
    spec:
      serviceAccountName: agentgateway
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, runAsUser: 1000, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: agentgateway
          # verify-at-build: pin @sha256 once resolved. Registry is cr.agentgateway.dev (verified 2026-06-25).
          image: cr.agentgateway.dev/agentgateway:v1.3.0
          imagePullPolicy: IfNotPresent
          args: ["-f", "/etc/agentgateway/config.yaml"]
          env:
            # UST for Datadog correlation (consumed by agentgateway's native OTel). The OTLP endpoint is set
            # in the config file's frontendPolicies.tracing block, NOT here (the env endpoint is inert).
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=agentgateway,service.version=v1.3.0,deployment.environment.name=production"
            # Bind the admin/UI off localhost so the liveness probe can reach it (default is localhost:15000).
            - name: ADMIN_ADDR
              value: "0.0.0.0:15000"
          ports:
            - { name: proxy, containerPort: 3000 } # A2A reverse proxy -> workshop-agent
            - { name: mcp, containerPort: 3001 }    # MCP front -> workshop-mcp
            - { name: admin, containerPort: 15000 } # admin/UI + health surface
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          # No documented /healthz on the OSS standalone binary; use TCP checks (verified 2026-06-25).
          readinessProbe: { tcpSocket: { port: proxy }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { tcpSocket: { port: admin }, initialDelaySeconds: 10, periodSeconds: 15 }
          volumeMounts:
            - { name: config, mountPath: /etc/agentgateway, readOnly: true }
            - { name: tmp, mountPath: /tmp } # writable scratch under readOnlyRootFilesystem
      volumes:
        - name: config
          configMap: { name: agentgateway-config }
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway
  labels: { app.kubernetes.io/name: agentgateway }
spec:
  selector: { app.kubernetes.io/name: agentgateway }
  ports:
    - { name: proxy, port: 3000, targetPort: proxy }
    - { name: mcp, port: 3001, targetPort: mcp }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-config
  labels: { app.kubernetes.io/name: agentgateway }
data:
  config.yaml: |
    # yaml-language-server: $schema=https://agentgateway.dev/schema/config
    # agentgateway OSS v1.3.0 standalone config. Field paths verified against
    # agentgateway.dev/docs/standalone/latest on 2026-06-25.

    # OTLP trace export (gRPC :4317). Config-file key, NOT an env var.
    frontendPolicies:
      tracing:
        otlpEndpoint: http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317
        randomSampling: true

    binds:
      # A2A reverse proxy: guard-proxy -> agentgateway:3000 -> kagent workshop-agent:8080.
      - port: 3000
        listeners:
          - protocol: HTTP
            routes:
              - backends:
                  - host: workshop-agent.agent.svc.cluster.local:8080
                    weight: 1
      # MCP front for the workshop MCP server, with default-allow authorization (beat-3 "before" state).
      # The restrictive allowlist (beat-3 "after") replaces the 'true' rule. workshop-mcp serves
      # streamable-http at :8000/mcp (verify-at-build: confirm the upstream path).
      - port: 3001
        listeners:
          - protocol: HTTP
            routes:
              - policies:
                  mcpAuthorization:
                    rules:
                      - 'true' # default Allow — all tools reachable (beat-3 "before")
                backends:
                  - mcp:
                      targets:
                        - name: workshop-mcp
                          mcp:
                            host: http://workshop-mcp.agent.svc.cluster.local:8000/mcp
