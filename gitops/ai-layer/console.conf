# ABOUTME: Console frontend (nginx-unprivileged) — serves the BurritoBot storefront as the front door and
# ABOUTME: path-routes to the web terminal (ttyd), the BurritoBot /chat backend, the legacy chat UI, and
# ABOUTME: the guard-proxy (A2A + cost). One Service per cluster, LB-exposed.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;   # burritbot.html + console.html + console.js (ConfigMap-mounted)

  # BurritoBot storefront (B1): the attendee front door. Its round selector posts to same-origin /chat
  # for round 3 (this cluster) and to round1/round2.agenticburn.com for the shared instructor clusters.
  location = /          { try_files /burritbot.html =404; }
  location = /burritbot { try_files /burritbot.html =404; }

  # Round-3 student lab page (B5/B12): Katacoda-style split, instructions left + ttyd embedded right.
  # This is what the provisioning "Open your terminal" button targets; it iframes /terminal/ below.
  location = /lab  { try_files /lab.html =404; }

  # The split console dashboard (terminal + chat + live cost), now under /console.
  location = /console    { try_files /console.html =404; }
  location = /console.js { try_files /console.js =404; }

  # BurritoBot backend (B1): POST {prompt} -> guard-proxy /chat, which returns {reply, guarded, tokens}.
  # Same input/output guards and cost metering as the A2A path, so the round-2/round-3 toggles affect it.
  location = /chat {
    proxy_pass http://guard-proxy:8080/chat;
    proxy_set_header Host $host;
    proxy_read_timeout 160s;
  }

  # Web terminal (ttyd serves under base-path /terminal); needs websocket upgrade.
  location /terminal/ {
    proxy_pass http://web-terminal:7681;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # Legacy split-console chat UI (its app.js posts A2A to /a2a/ and polls /cost).
  location /chat/ {
    proxy_pass http://chat-ui:80/;
    proxy_set_header Host $host;
  }

  # Guard-proxy: the A2A endpoint (root), the guard-state, and the live cost.
  location /a2a/ {
    proxy_pass http://guard-proxy:8080/;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
  }
  location = /cost    { proxy_pass http://guard-proxy:8080/cost; }
  location = /guards  { proxy_pass http://guard-proxy:8080/guards; }
}
