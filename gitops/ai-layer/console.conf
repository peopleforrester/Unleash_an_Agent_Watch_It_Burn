# ABOUTME: Console frontend (nginx-unprivileged) — serves the split console UI and path-routes to the
# ABOUTME: web terminal (ttyd), the chat UI, and the guard-proxy (A2A + cost). One Service per cluster, LB-exposed.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;   # console.html + console.js (ConfigMap-mounted)

  # The split console (default).
  location = / { try_files /console.html =404; }
  location = /console.js { try_files /console.js =404; }

  # Web terminal (ttyd serves under base-path /terminal); needs websocket upgrade.
  location /terminal/ {
    proxy_pass http://web-terminal:7681;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # Chat UI (its app.js posts A2A to /a2a/ and polls /cost — both routed below).
  location /chat/ {
    proxy_pass http://chat-ui:80/;
    proxy_set_header Host $host;
  }

  # Guard-proxy: the A2A endpoint (root) and the live cost/metrics.
  location /a2a/ {
    proxy_pass http://guard-proxy:8080/;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
  }
  location = /cost    { proxy_pass http://guard-proxy:8080/cost; }
  location = /metrics { proxy_pass http://guard-proxy:8080/metrics; }
}
