# ABOUTME: Kustomize bundle for the Watch It Burn AI layer — everything lands in namespace 'agent'.
# ABOUTME: Generates the proxy.py / server.py ConfigMaps and the LLM Guard auth Secret from local files.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agent

resources:
  - resources.yaml
  - instrumentation.yaml # OTel Operator Instrumentation CR (needs the otel-operator app's CRD; ArgoCD retries until present)
  - agentgateway.yaml # OSS v1.3.0 L7 gateway: guard-proxy -> agentgateway -> workshop-agent (A2A) + MCP front
  - argocd-managed-app.yaml # Beat-1 wall-3 drift target (ArgoCD-managed; admission denies agent drift, self-heal reverts)
  - kubearmor-ordering-gate.yaml # PreSync hook: wait for KubeArmor webhook Ready so workshop-mcp is admitted+annotated for enforcement

configMapGenerator:
  - name: guard-proxy-src
    files:
      - proxy.py
  - name: evil-mcp-src
    files:
      - server.py
  - name: workshop-mcp-src
    files:
      - server.py=workshop-mcp-server.py # key is server.py so the container's /app/server.py path matches
  - name: chat-ui-src
    files:
      - web/index.html
      - web/app.js
      - web/display.html
      - web/display.js
  - name: console-src
    files:
      - web/console.html
      - web/console.js
      - web/burritbot.html # B1: the BurritoBot storefront, served by the console nginx as the front door
      - web/lab.html # B5/B12: round-3 student lab page (instructions left + ttyd terminal embedded right)
  - name: console-conf
    files:
      - default.conf=console.conf # nginx conf.d entry

secretGenerator:
  - name: llm-guard-auth
    literals:
      - token=witb-llm-guard-token # verify-at-build: source from a real secret store (ESO) for prod

generatorOptions:
  disableNameSuffixHash: true # stable names — Deployments reference these by fixed name
