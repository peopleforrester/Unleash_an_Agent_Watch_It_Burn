# ABOUTME: Kubernetes namespace definitions for all platform components.
# ABOUTME: Creates 8 namespaces with PSS labels on apps namespace for defense-in-depth.
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
---
apiVersion: v1
kind: Namespace
metadata:
  name: backstage
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
---
apiVersion: v1
kind: Namespace
metadata:
  name: apps
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
---
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
---
apiVersion: v1
kind: Namespace
metadata:
  name: kagent
  labels:
    app.kubernetes.io/part-of: watch-it-burn
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent
  labels:
    app.kubernetes.io/part-of: watch-it-burn
    app.kubernetes.io/component: ai-layer
---
apiVersion: v1
kind: Namespace
metadata:
  name: datadog
  labels:
    app.kubernetes.io/part-of: watch-it-burn-idp
