# ABOUTME: Ingress for the Hedgehog Party demo app via shared ALB.
# ABOUTME: Exposes hedgehog.agenticburn.com over HTTP (lab; no TLS).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hedgehog-party
  namespace: apps
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/group.name: watch-it-burn-ingress
spec:
  ingressClassName: alb
  rules:
    - host: hedgehog.agenticburn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hedgehog-party
                port:
                  number: 80
