# ABOUTME: Ingress for the Spider Party demo app via shared ALB.
# ABOUTME: Exposes spider.agenticburn.com with TLS via wildcard cert.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spider-party
  namespace: apps
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/group.name: watch-it-burn-ingress
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:<ACCOUNT_ID>:certificate/REPLACE-WITH-AGENTICBURN-CERT
spec:
  ingressClassName: alb
  rules:
    - host: spider.agenticburn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spider-party
                port:
                  number: 80
