# ABOUTME: ExternalSecret syncing the Datadog api-key + app-key from AWS Secrets Manager (PRD #26 M1).
# ABOUTME: Creates the `datadog-secret` Secret in the datadog namespace, consumed by the DatadogAgent CR.
#
# Pulls watch-it-burn/datadog (within the ESO Pod Identity role's secret:watch-it-burn/* scope). The
# ClusterSecretStore is cluster-wide, so this works from the datadog namespace with no per-ns SecretStore.
# Lands in the same ArgoCD Application (sync-wave 4) as the DatadogAgent CR; ESO populates the secret
# asynchronously, so the Operator's first CR reconcile may briefly fail until the secret exists (expected).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: datadog-secret
  namespace: datadog
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: datadog-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: watch-it-burn/datadog
        property: api-key
    - secretKey: app-key
      remoteRef:
        key: watch-it-burn/datadog
        property: app-key
