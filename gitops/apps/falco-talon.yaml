# ABOUTME: Falco Talon response engine. Falco detects the fork bomb -> Falcosidekick forwards (critical)
# ABOUTME: -> Talon terminates the offending pod. This is the detect-and-RESPOND beat; the real BLOCK
# ABOUTME: is the per-pod PID limit (infra/node-config/), since detect-to-act has latency a bomb outruns.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco-talon
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: falco-talon
    repoURL: https://falcosecurity.github.io/charts
    targetRevision: "0.4.1" # verify-at-build: app v0.3.0; confirm chart version (helm search repo falcosecurity/falco-talon)
    helm:
      valuesObject:
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 200m, memory: 128Mi }
        config:
          # Talon rules: on the fork-bomb Falco event, terminate the offending pod.
          # MUST be config.rulesOverride (the chart key); a top-level rulesOverride is silently ignored,
          # leaving Talon on the chart-default action that has no match -> "0 rules loaded" (caught live
          # on watch-it-burn-test). The chart renders this into rules.yaml, the file Talon reads (-r).
          # Talon v0.3.0 schema: ACTIONS (- action: + actionner:) and RULES (- rule: + match: + actions:)
          # are SEPARATE entries; an action with an embedded match: is invalid and loads as 0 rules.
          rulesOverride: |
            - action: Terminate the fork-bomb pod
              actionner: kubernetes:terminate
              parameters:
                grace_period_seconds: 0

            - rule: Fork Bomb Response
              match:
                rules:
                  - Fork Bomb In Workload Container
              actions:
                - action: Terminate the fork-bomb pod

            - rule: Recipe Snoop Response
              match:
                rules:
                  - Recipe Snoop In Agent Namespace
              actions:
                - action: Terminate the fork-bomb pod
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
