# ABOUTME: ArgoCD Application for the Watch It Burn AI layer (kustomize bundle in gitops/ai-layer).
# ABOUTME: Syncs after kagent (CRDs + controller). agent-sa IRSA is added by a bootstrap step (IAM).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-layer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/Unleash_an_Agent_Watch_It_Burn.git
    targetRevision: staging
    path: gitops/ai-layer
  destination:
    server: https://kubernetes.default.svc
    namespace: agent
  # Beat-2 LIVE TOGGLES: the demo flips the guard-proxy INPUT_GUARD / OUTPUT_GUARD env on/off via
  # kubectl patch (challenges/02-sanitization/toggle-*.sh). Ignore drift on the proxy container's env so
  # selfHeal does not revert the live toggle (same selfHeal-vs-toggle issue the gate run found for
  # beat-1). verify-at-build: re-confirm on a live cluster once the agent compiles (gated on workshop-mcp).
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: guard-proxy
      jqPathExpressions:
        - '.spec.template.spec.containers[] | select(.name=="proxy") | .env'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
