# ABOUTME: ArgoCD Application for the Watch It Burn AI layer (kustomize bundle in gitops/ai-layer).
# ABOUTME: Syncs after kagent (CRDs + controller). agent-sa IRSA is added by a bootstrap step (IAM).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-layer
  namespace: argocd
  annotations:
    # Wave 3 (AFTER the OTel Operator + collector at wave 2). The Operator's mutating webhook injects the
    # OTel SDK into guard-proxy/workshop-agent at pod-create; if this layer deploys in the SAME wave as the
    # Operator (it was wave 2), the app pods are admitted before the webhook is ready and get NO
    # instrumentation, so they export ZERO telemetry (the 2026-06-26 "Datadog is empty" root cause).
    # Deploying after the Operator is Healthy lets the webhook instrument the pods. Safety net for any
    # residual webhook-cert race: infra/reinstrument-app-pods.sh.
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/Unleash_an_Agent_Watch_It_Burn.git
    targetRevision: staging
    path: gitops/ai-layer
  destination:
    server: https://kubernetes.default.svc
    namespace: agent
  # Beat-2 LIVE TOGGLES: the demo flips the guard-proxy INPUT_GUARD / OUTPUT_GUARD env on/off via
  # kubectl patch (challenges/02-sanitization/toggle-*.sh). Ignore drift on the proxy container's env so
  # selfHeal does not revert the live toggle (same selfHeal-vs-toggle issue the gate run found for
  # beat-1). verify-at-build: re-confirm on a live cluster once the agent compiles (gated on workshop-mcp).
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: guard-proxy
      jqPathExpressions:
        - '.spec.template.spec.containers[] | select(.name=="proxy") | .env'
    # Beat-3 (C7) LIVE TOGGLE: challenges/03-bad-mcp-excessive-agency/toggle-mcp-authz-on.sh patches
    # the kagent Agent's MCP toolNames allowlist (ON excludes the rogue tools, --off lets them back in).
    # Ignore drift on the Agent's tools so selfHeal does not revert the live toggle, same as the
    # guard-proxy env toggles above. The committed default (resources.yaml) is the defended "on" list.
    - group: kagent.dev
      kind: Agent
      name: workshop-agent
      jqPathExpressions:
        - '.spec.declarative.tools'
        # Per-cluster model tier (cost-race demo): setup-instructor-cluster.sh patches modelConfig to
        # bedrock-haiku/sonnet/opus on the matching R3 instructor cluster. Ignore drift so selfHeal keeps
        # the per-cluster tier instead of reverting to the committed default (bedrock-sonnet).
        - '.spec.declarative.modelConfig'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
