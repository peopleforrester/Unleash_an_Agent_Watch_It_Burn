# ABOUTME: ArgoCD Application for OpenTelemetry Collector DaemonSet.
# ABOUTME: Receives OTLP telemetry from apps and exports metrics to Prometheus via remote write.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: opentelemetry-collector
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    targetRevision: "0.158.2"
    helm:
      valuesObject:
        image:
          repository: "otel/opentelemetry-collector-contrib"
        mode: daemonset
        presets:
          kubernetesAttributes:
            enabled: true
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          processors:
            memory_limiter:
              check_interval: 1s
              limit_mib: 400
              spike_limit_mib: 100
            batch:
              timeout: 5s
              send_batch_size: 1024
              send_batch_max_size: 2048
            resource:
              attributes:
                - key: cluster.name
                  value: watch-it-burn
                  action: upsert
            # RE-LEAK-TRAP ACT 2 TOGGLE (PRD #22 M2/M4). Canonical source: otel-collector-act2-overlay.yaml.
            # Replaces the captured guard-proxy sanitize-span content with [DEMO-REDACTED] at the Collector
            # boundary, so the leaked prompt never reaches Datadog/Tempo. Present here = Act 2 (fixed);
            # remove this processor AND its traces-pipeline entry below = Act 1 (leak visible). The cluster's
            # kyverno block-argocd-drift policy forbids live ConfigMap edits, so this toggle is GitOps-only:
            # commit to flip to Act 2, revert the commit to return to Act 1.
            transform/redact_sentinel:
              error_mode: ignore
              trace_statements:
                - context: span
                  statements:
                    - set(attributes["gen_ai.input.messages"], "[DEMO-REDACTED]") where attributes["gen_ai.operation.name"] == "chat" and IsString(attributes["gen_ai.input.messages"])
                    - set(attributes["gen_ai.output.messages"], "[DEMO-REDACTED]") where attributes["gen_ai.operation.name"] == "chat" and IsString(attributes["gen_ai.output.messages"])
          exporters:
            prometheusremotewrite:
              endpoint: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
              tls:
                insecure: true
              resource_to_telemetry_conversion:
                enabled: true
            otlp/tempo:
              endpoint: tempo.monitoring.svc.cluster.local:4317
              tls:
                insecure: true
            # PRIMARY telemetry sink: Datadog (Whitney's account). prometheusremotewrite + otlp/tempo
            # are the secondary "analog" fallback. DD_API_KEY / DD_SITE come from the datadog-secret
            # (BYO; never stored in this repo). verify-at-build: create the secret + set the DD site.
            datadog:
              api:
                key: ${env:DD_API_KEY}
                site: ${env:DD_SITE}
            debug:
              verbosity: basic
              sampling_initial: 5
              sampling_thereafter: 200
          connectors:
            # Generates RED metrics from spans. add_resource_attributes propagates the UST resource
            # attributes (deployment.environment.name -> env, service.version) onto the generated
            # metrics; it defaults to false, and without it Datadog "View related logs" from a
            # span-derived metric silently finds nothing (research/19, research/23).
            # verify-at-build: confirm the connector key is `spanmetrics` and that
            # add_resource_attributes is supported on collector-contrib 0.158.2.
            spanmetrics:
              add_resource_attributes: true
            # datadog/connector computes APM Trace Metrics (the trace.* namespace used by SLOs/monitors).
            # Required since otelcol-contrib v0.95.0: the Datadog exporter no longer derives these itself.
            # compute_stats_by_span_kind so stats are computed for client/server/etc. spans (PRD #13 M2).
            datadog/connector:
              traces:
                compute_stats_by_span_kind: true
          service:
            telemetry:
              logs:
                level: info
              metrics:
                address: 0.0.0.0:8888
            pipelines:
              metrics:
                receivers:
                  - otlp
                  - spanmetrics # RED metrics generated from spans (carry UST tags for correlation)
                  - datadog/connector # APM trace.* metrics (compute_stats_by_span_kind); PRD #13 M2
                processors:
                  - memory_limiter
                  - batch
                  - resource
                exporters:
                  - datadog               # primary
                  - prometheusremotewrite # secondary / fallback
                  - debug
              traces:
                receivers:
                  - otlp
                processors:
                  - memory_limiter
                  - batch
                  - resource
                  - transform/redact_sentinel # RE-LEAK-TRAP ACT 2 (PRD #22 M4): last, before exporters. Remove for Act 1.
                exporters:
                  - datadog      # primary
                  - otlp/tempo   # secondary / fallback
                  - spanmetrics  # feed the connector so it can derive metrics from these spans
                  - datadog/connector # feed the APM-stats connector (trace.* metrics); PRD #13 M2
                  - debug
        # Datadog credentials for the primary exporter (BYO secret; not stored in this repo).
        # verify-at-build: create `datadog-secret` (key api-key) from Whitney's Datadog account and
        # set DD_SITE to that account's site (e.g. datadoghq.com, us5.datadoghq.com, datadoghq.eu).
        extraEnvs:
          - name: DD_API_KEY
            valueFrom:
              secretKeyRef:
                name: datadog-secret
                key: api-key
          - name: DD_SITE
            value: "datadoghq.com"
        service:
          enabled: true
          type: ClusterIP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP
          metrics:
            enabled: true
            containerPort: 8888
            servicePort: 8888
            protocol: TCP
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
