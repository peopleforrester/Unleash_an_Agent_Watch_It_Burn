# ABOUTME: ArgoCD Application for the minimal restriction floor (its own app so the burn cluster can
# ABOUTME: keep the floor WITHOUT the enforcing Kyverno policies). Applies to all profiles.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minimal-floor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4" # after the Kyverno engine (-5), before workloads
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/Unleash_an_Agent_Watch_It_Burn.git
    targetRevision: staging
    path: policies/floor
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
