# ABOUTME: ArgoCD Application for Kyverno policy engine installation.
# ABOUTME: Deploys Kyverno 1.17+ to kyverno namespace with webhook exclusions.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: kyverno
    repoURL: https://kyverno.github.io/kyverno
    targetRevision: "3.8.1"
    helm:
      valuesObject:
        # Kyverno namespace excluded by default (excludeKyvernoNamespace: true)
        # Extend webhook exclusions to include additional system namespaces
        config:
          webhooks:
            namespaceSelector:
              matchExpressions:
                - key: kubernetes.io/metadata.name
                  operator: NotIn
                  values:
                    - kube-system
                    - kube-public
                    - kube-node-lease
        # Resource limits for Kyverno admission controller
        admissionController:
          replicas: 1
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
          # Native OTLP to the in-cluster OTel Collector (PRD #26 M3, meta-PRD M5 D9): policy-decision
          # traces + metrics go straight to the Collector (which routes to Datadog), instead of an Agent
          # `kyverno` Prometheus check (which would duplicate metrics + add billing noise). The admission
          # controller is where allow/deny decisions are made, so its traces are the demo-relevant ones.
          # metering.config: grpc => OTLP gRPC metrics to metering.collector. tracing => decision spans.
          tracing:
            enabled: true
            address: otel-collector-opentelemetry-collector.monitoring.svc.cluster.local
            port: 4317
          metering:
            config: grpc
            collector: otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317
        # Background controller for policy reports
        backgroundController:
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
        # Cleanup controller
        cleanupController:
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
        # Reports controller
        reportsController:
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
