# ABOUTME: ArgoCD Application for Kyverno policy engine installation.
# ABOUTME: Deploys Kyverno 1.17+ to kyverno namespace with webhook exclusions.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: kyverno
    repoURL: https://kyverno.github.io/kyverno
    targetRevision: "3.8.1"
    helm:
      valuesObject:
        # Kyverno namespace excluded by default (excludeKyvernoNamespace: true)
        # Extend webhook exclusions to include additional system namespaces
        config:
          webhooks:
            namespaceSelector:
              matchExpressions:
                - key: kubernetes.io/metadata.name
                  operator: NotIn
                  values:
                    - kube-system
                    - kube-public
                    - kube-node-lease
        # Resource limits for Kyverno admission controller
        admissionController:
          replicas: 1
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
          # Datadog Agent Autodiscovery scrapes Kyverno's native Prometheus /metrics (:8000).
          #
          # REVISES meta-PRD M5 D9 (which chose native OTLP `otelConfig: grpc` to avoid an Agent check):
          # live on the cluster, Kyverno's bundled gRPC/OTel exporter fails with `name resolver error:
          # produced zero addresses` even against a literal ClusterIP (a gRPC-Go #7625 regression baked into
          # the kyverno binary), so the OTLP path delivers ZERO metrics. Switched to the Datadog Agent
          # openmetrics check, the same proven pattern as falco/cert-manager/istio. It works, and it emits
          # the `kyverno.*` metric names the official Datadog Kyverno OOTB dashboard expects. No duplicate
          # metrics (OTLP was producing none). The container name is `kyverno`. Verified live 2026-06-25.
          metering:
            config: prometheus
            port: 8000
          podAnnotations:
            # Datadog Unified Service Tagging (PRD #28): puts the Kyverno admission controller on the
            # service catalog / map. env locked to production; version = deployed Kyverno appVersion.
            tags.datadoghq.com/service: kyverno
            tags.datadoghq.com/env: production
            tags.datadoghq.com/version: "v1.18.1"
            ad.datadoghq.com/kyverno.checks: |
              {"kyverno":{"instances":[{"openmetrics_endpoint":"http://%%host%%:8000/metrics"}]}}
        # Background controller for policy reports
        backgroundController:
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
        # Cleanup controller
        cleanupController:
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
        # Reports controller
        reportsController:
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
