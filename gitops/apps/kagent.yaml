# ABOUTME: ArgoCD Application for the kagent controller (AI layer — Watch It Burn only).
# ABOUTME: The agent runtime; our Bedrock ModelConfig + scoped Agent CRs are applied on top.
# verify-at-build: OCI Helm via ArgoCD may require the registry registered as an OCI Helm repo.
# NOTE: the scoped Agent + Bedrock ModelConfig + guard layer (LLM Guard/guard-proxy/evil-MCP) still
# deploy via infra/cluster3-setup.sh because they need IRSA (IAM — not GitOps-able without ACK/Crossplane),
# the proxy.py ConfigMap, and a concrete namespace. Materializing those into GitOps is the open follow-up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ghcr.io/kagent-dev/kagent/helm
    chart: kagent
    targetRevision: "0.9.9"
    helm:
      valuesObject:
        # Disable the chart's built-in agent fleet — we run only our own workshop-agent. The defaults
        # otherwise CrashLoop/CreateContainerConfigError on a missing OpenAI secret and waste resources.
        argo-rollouts-agent: { enabled: false }
        cilium-debug-agent: { enabled: false }
        cilium-manager-agent: { enabled: false }
        cilium-policy-agent: { enabled: false }
        helm-agent: { enabled: false }
        istio-agent: { enabled: false }
        k8s-agent: { enabled: false }
        kgateway-agent: { enabled: false }
        observability-agent: { enabled: false }
        promql-agent: { enabled: false }
        # Agent tracing/logging. DEFAULT IS false: the controller writes OTEL_TRACING_ENABLED=false /
        # OTEL_LOGGING_ENABLED=false into the kagent-controller ConfigMap, which it then injects into every
        # generated agent pod. With tracing off, kagent installs a NoOp tracer provider that suppresses the
        # ADK gen_ai spans (invoke_agent -> chat -> execute_tool) — so the agent's input/output prompts AND
        # tool calls never reach Datadog, and the agent never appears in the Service Map. (gen_ai METRICS
        # still flow because they use a separate meter provider the flag does not touch — that is why token
        # usage / cost were present while traces were empty.) Turn both on; the agent then exports its spans
        # through the OTel-Operator-injected OTLP endpoint (otel-collector ...:4318) that already carries the
        # metrics, into the Collector traces pipeline -> Datadog. PRD #20 / #27 (live Service Map + GenAI).
        otel:
          tracing: { enabled: true }
          logging: { enabled: true }
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
