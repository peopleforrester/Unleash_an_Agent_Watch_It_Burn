# ABOUTME: ArgoCD Application for Kyverno ClusterPolicy deployment.
# ABOUTME: Syncs policies from policies/kyverno/ after Kyverno CRDs are available.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/Unleash_an_Agent_Watch_It_Burn.git
    targetRevision: staging
    path: policies/kyverno
  destination:
    server: https://kubernetes.default.svc
  # Beat-1 LIVE TOGGLE: the demo flips require-resource-limits validate.failureAction Audit<->Enforce
  # via kubectl patch (challenges/01-cncf-wall/toggle-kyverno-enforce.sh). Without this, selfHeal reverts
  # the live toggle instantly. Ignore drift ONLY on that one field so selfHeal still corrects all
  # other drift (the live gate run on watch-it-burn-test caught this).
  ignoreDifferences:
    - group: kyverno.io
      kind: ClusterPolicy
      name: require-resource-limits
      jsonPointers:
        - /spec/rules/0/validate/failureAction
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
