# ABOUTME: ArgoCD Application for kagent CRDs (AI layer — Watch It Burn only, not in KubeAuto).
# ABOUTME: Must sync before the kagent controller and any Agent/ModelConfig CRs.
# verify-at-build: OCI Helm via ArgoCD may require the registry registered as an OCI Helm repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ghcr.io/kagent-dev/kagent/helm
    chart: kagent-crds
    targetRevision: "0.9.9" # current GA (2026-06; CRD group kagent.dev/v1alpha2, Bedrock-capable)
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
