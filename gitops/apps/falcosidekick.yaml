# ABOUTME: ArgoCD Application for Falcosidekick event forwarder.
# ABOUTME: Receives Falco alerts and exposes Prometheus metrics endpoint.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falcosidekick
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: falcosidekick
    repoURL: https://falcosecurity.github.io/charts
    targetRevision: "0.14.0"
    helm:
      valuesObject:
        config:
          prometheus:
            extralabels: ""
          # Forward CRITICAL events (the fork bomb) to Falco Talon for auto-remediation (kill the pod).
          # Falcosidekick runs in 'security' and Talon's Service lives in 'falco', so the address MUST be
          # the cross-namespace FQDN; a bare 'falco-talon' resolves in 'security' and fails with NXDOMAIN
          # (caught live on watch-it-burn-test: "lookup falco-talon ... no such host").
          talon:
            address: http://falco-talon.falco.svc.cluster.local:2803
            minimumpriority: critical
          # Forward Falco alerts to Datadog (so runtime detections show in the Datadog story). The
          # apikey is supplied via the DATADOG_APIKEY env from the shared datadog-secret (env overrides
          # yaml; populating the key enables the output), so no key is stored in this repo. Stays
          # swappable: drop this datadog block + the env to run Datadog-free (Falco still feeds Talon
          # and Prometheus). DATADOG_HOST defaults to https://api.datadoghq.com.
          datadog:
            minimumpriority: notice
          # verify-at-build CONFIRMED live 2026-06-25: chart 0.14.0 reads extraEnv at `config.extraEnv`,
          # NOT at the top level. Placed at the top level the chart silently DROPS it, so DATADOG_APIKEY
          # never reaches the pod and the Datadog output stays disabled (falcosidekick forwards only to
          # Talon). The datadog-secret (key api-key) must exist in the `security` namespace (falcosidekick's
          # ns), not only `monitoring`. Set DATADOG_HOST to Whitney's site (https://api.us5.datadoghq.com,
          # https://api.datadoghq.eu) if the org is not US1.
          extraEnv:
            - name: DATADOG_APIKEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: api-key
            - name: DATADOG_HOST
              value: "https://api.datadoghq.com"
        webui:
          enabled: false
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "2801"
          prometheus.io/path: "/metrics"
        replicaCount: 2
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            # 128Mi OOM-killed (exit 137) under the live attack-event flood, breaking the Falco -> Datadog
            # forward (C3 alert payoff). 512Mi gives burst-queuing headroom; falcosidekick buffers events.
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
