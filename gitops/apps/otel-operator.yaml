# ABOUTME: ArgoCD Application for the OpenTelemetry Operator (PRD #20 M2). Owns the Instrumentation CRD
# ABOUTME: and injects the Python OTel SDK into annotated pods (guard-proxy), so app images stay slim.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-operator
  namespace: argocd
  annotations:
    # Wave 2: cert-manager (wave 1) must be up first; the Operator's admission webhook uses a
    # cert-manager-issued cert by default. The Operator installs the Instrumentation + OpenTelemetryCollector
    # CRDs that gitops/ai-layer/instrumentation.yaml depends on.
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-operator
    targetRevision: "0.117.0"
    helm:
      valuesObject:
        # The manager image's collector tag must be pinned (the chart requires it explicitly).
        manager:
          collectorImage:
            repository: otel/opentelemetry-collector-k8s
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
        admissionWebhooks:
          certManager:
            enabled: true  # cert-manager is in the stack (gitops/apps/cert-manager.yaml)
        crds:
          create: true  # install the Instrumentation + OpenTelemetryCollector CRDs
  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        maxDuration: 3m
        factor: 2
