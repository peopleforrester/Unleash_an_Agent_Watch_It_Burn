# ABOUTME: Root app-of-apps for the BURN cluster (Cluster 1, the "no guardrails" spectacle).
# ABOUTME: Deliberately bare: NO admission control at all (no Kyverno, no floor), no RBAC scoping app,
# ABOUTME: no GitOps-drift block. Just the agent + cost-meter proxy and the party burn targets. It is
# ABOUTME: meant to die in one prompt; the facilitator rotates ~10 disposable C1 spares from SSH.
# verify-at-build: confirm ArgoCD directory.include brace-glob selects exactly these child apps.
# NOTE: the agent still needs Bedrock IRSA per cluster (IAM, not GitOps) — see infra/cluster3-setup.sh / deploy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps-burn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/Unleash_an_Agent_Watch_It_Burn.git
    targetRevision: staging
    path: gitops/apps
    directory:
      recurse: false
      # Burn subset: NO admission at all (no kyverno engine, no minimal-floor), NO RBAC/falco/
      # observability/cert-manager/eso/backstage. Just the agent + ai-layer (cost meter) + burn targets.
      include: '{namespaces,kagent-crds,kagent,ai-layer,customer-stream,unicorn-party,hedgehog-party,spider-party,wombat-party,mantis-shrimp-party}.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
