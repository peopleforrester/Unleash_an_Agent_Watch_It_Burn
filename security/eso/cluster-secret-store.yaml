# ABOUTME: ClusterSecretStore connecting ESO to AWS Secrets Manager.
# ABOUTME: Auths via EKS Pod Identity on the ESO controller SA (platform:external-secrets).
#
# Pod Identity, NOT IRSA: infra/terraform/aws/cluster/main.tf (module "eso_pod_identity") gives the
# platform:external-secrets SA a per-cluster Pod Identity association (attach_external_secrets_policy),
# the modern fleet-safe convention that replaced the IRSA role. The EKS Pod Identity agent injects
# AWS_CONTAINER_CREDENTIALS_FULL_URI + a token into the ESO controller pod, so ESO must use the DEFAULT
# AWS credential chain (omit `auth`). The previous `auth.jwt.serviceAccountRef` block forced
# AssumeRoleWithWebIdentity, which has no role to assume here (the SA carries no eks.amazonaws.com/role-arn
# annotation), so the store failed cluster-wide with "unable to create client". Fixed + verified live 2026-06-25.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
